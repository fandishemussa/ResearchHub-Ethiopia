# Continuous integration for backend and harvester quality gates.

name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Lint
        run: ruff check backend harvester ai tests
      - name: Type check
        run: mypy backend harvester ai
      - name: Test
        run: pytest

