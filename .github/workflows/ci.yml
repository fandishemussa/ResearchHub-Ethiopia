name: CI

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master
    tags:
      - "v*.*.*"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # Linting, formatting, and static type checking
  # ===========================================================================
  quality:
    name: Lint, format, and type safety
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"
          python -m pip install \
            "ruff>=0.8" \
            "mypy>=1.13"
          python -m pip check

      - name: Display tool versions
        run: |
          python --version
          ruff --version
          mypy --version

      - name: Run Ruff linting
        run: |
          ruff check \
            backend \
            harvester \
            ai \
            scripts \
            tests \
            --output-format=github

      - name: Check Ruff formatting
        run: |
          ruff format --check \
            backend \
            harvester \
            ai \
            scripts \
            tests

      - name: Run strict mypy checks
        run: mypy backend harvester ai

  # ===========================================================================
  # Unit tests and coverage
  # ===========================================================================
  unit-tests:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"

          # Explicit installation keeps coverage available even if an older
          # pyproject.toml test-extra definition is temporarily cached.
          python -m pip install \
            "pytest>=8.3" \
            "pytest-asyncio>=0.24" \
            "pytest-cov>=6.0"

          python -m pip check

      - name: Verify pytest plugins
        run: |
          python -m pytest --version
          python -m coverage --version

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --strict-config \
            --strict-markers \
            --junitxml=pytest-results.xml \
            --cov=researchhub \
            --cov=researchhub_harvester \
            --cov=researchhub_ai \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-reports
          path: |
            pytest-results.xml
            coverage.xml
          if-no-files-found: warn
          retention-days: 14

  # ===========================================================================
  # PostgreSQL, pgvector, Redis, and migration validation
  # ===========================================================================
  integration-tests:
    name: Database, Redis, and migrations
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: researchhub
          POSTGRES_PASSWORD: researchhub
          POSTGRES_DB: researchhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U researchhub -d researchhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      RESEARCHHUB_APP_ENV: test
      RESEARCHHUB_DATABASE_URL: >-
        postgresql+asyncpg://researchhub:researchhub@localhost:5432/researchhub
      RESEARCHHUB_SYNC_DATABASE_URL: >-
        postgresql+psycopg://researchhub:researchhub@localhost:5432/researchhub
      RESEARCHHUB_REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"
          python -m pip check

      - name: Check Alembic revision heads
        run: |
          HEAD_COUNT="$(alembic -c backend/alembic.ini heads | wc -l)"
          echo "Alembic head count: ${HEAD_COUNT}"
          test "${HEAD_COUNT}" -eq 1

      - name: Apply database migrations
        run: alembic -c backend/alembic.ini upgrade head

      - name: Verify current migration head
        run: alembic -c backend/alembic.ini current --check-heads

      - name: Smoke-test application imports
        run: |
          python - <<'PY'
          from researchhub.main import app

          assert app.title
          assert app.routes
          print(f"Loaded FastAPI application: {app.title}")
          print(f"Registered routes: {len(app.routes)}")
          PY

  # ===========================================================================
  # Python distribution validation
  # ===========================================================================
  package:
    name: Build Python distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "build>=1.2"

      - name: Build wheel and source distribution
        run: python -m build

      - name: Display generated distributions
        run: ls -lh dist/

      - name: Install and verify built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          from researchhub.main import app
          from researchhub_ai import __name__ as ai_package
          from researchhub_harvester import __name__ as harvester_package

          assert app.title
          assert ai_package == "researchhub_ai"
          assert harvester_package == "researchhub_harvester"
          print("Built distribution imports successfully.")
          PY

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # ===========================================================================
  # Static security analysis
  # ===========================================================================
  codeql:
    name: CodeQL security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Analyze source
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

  # ===========================================================================
  # Docker image validation
  # ===========================================================================
  docker:
    name: Build and smoke-test backend image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    needs:
      - quality
      - unit-tests
      - integration-tests
      - package

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          load: true
          push: false
          tags: researchhub-ethiopia:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Inspect backend image
        run: docker image inspect researchhub-ethiopia:ci

      - name: Smoke-test backend image
        run: |
          docker run --rm researchhub-ethiopia:ci \
            python -c \
            "from researchhub.main import app; assert app.title; print(app.title)"

  # ===========================================================================
  # Stable branch-protection gate
  # ===========================================================================
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    timeout-minutes: 5

    if: always()

    needs:
      - quality
      - unit-tests
      - integration-tests
      - package
      - codeql
      - docker

    steps:
      - name: Display required job results
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.integration-tests.result }}
          PACKAGE: ${{ needs.package.result }}
          CODEQL: ${{ needs.codeql.result }}
          DOCKER: ${{ needs.docker.result }}
        run: |
          {
            echo "quality=${QUALITY}"
            echo "unit-tests=${UNIT_TESTS}"
            echo "integration-tests=${INTEGRATION_TESTS}"
            echo "package=${PACKAGE}"
            echo "codeql=${CODEQL}"
            echo "docker=${DOCKER}"
          } | tee ci-results.txt

      - name: Enforce required job results
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          INTEGRATION_TESTS: ${{ needs.integration-tests.result }}
          PACKAGE: ${{ needs.package.result }}
          CODEQL: ${{ needs.codeql.result }}
          DOCKER: ${{ needs.docker.result }}
        run: |
          for result in \
            "${QUALITY}" \
            "${UNIT_TESTS}" \
            "${INTEGRATION_TESTS}" \
            "${PACKAGE}" \
            "${CODEQL}" \
            "${DOCKER}"; do
            if [[ "${result}" != "success" ]]; then
              echo "::error::A required CI job did not succeed: ${result}"
              exit 1
            fi
          done

          echo "All required CI jobs succeeded."

  # ===========================================================================
  # Continuous delivery
  # Runs only for trusted pushes, never for pull requests.
  # Requires .github/workflows/delivery.yml.
  # ===========================================================================
  delivery:
    name: Deliver trusted image

    if: github.event_name == 'push'

    needs:
      - ci-success

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    uses: ./.github/workflows/delivery.yml

    with:
      source-ref: ${{ github.sha }}

    secrets: inherit