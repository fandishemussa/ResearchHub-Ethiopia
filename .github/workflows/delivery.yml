name: Container delivery

on:
  workflow_call:
    inputs:
      source-ref:
        description: Immutable commit SHA that passed CI
        required: true
        type: string
  workflow_dispatch:
    inputs:
      source-ref:
        description: Commit SHA or Git ref to publish
        required: true
        default: master
        type: string

permissions:
  contents: read

concurrency:
  group: delivery-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish verified backend image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-ref }}

      - name: Normalize image name
        id: image
        env:
          RAW_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: echo "name=${RAW_IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ResearchHub Ethiopia Backend
            org.opencontainers.image.description=FastAPI, harvesting, worker, and research intelligence runtime

      - name: Build and publish multi-platform image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest published image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Write delivery summary
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          {
            echo "## Container delivery completed"
            echo
            echo "**Image:** \`${IMAGE}\`"
            echo
            echo "**Digest:** \`${DIGEST}\`"
            echo
            echo "### Published tags"
            echo '```text'
            echo "${TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
