worker_processes auto;

events {
    worker_connections 4096;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream researchhub_api {
        zone api 64k;
        server api:8111 resolve;
        keepalive 64;
    }

    upstream researchhub_frontend {
        server frontend:3000;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=public_api:10m rate=50r/s;
    client_max_body_size 100m;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    server {
        listen 8111;

        location / {
            limit_req zone=public_api burst=100 nodelay;
            proxy_pass http://researchhub_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_buffering off;
        }
    }

    server {
        listen 8080;

        location /api/ {
            proxy_pass http://researchhub_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://researchhub_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
